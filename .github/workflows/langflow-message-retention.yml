name: Langflow message retention (7 days)

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: host-langflow
    env:
      ECS_CLUSTER: fc-web-server-f0ei9o-x1ck1bek
      ECS_SERVICE: fc-web-server-f0ei9o-x1ck1bek
      AWS_REGION: us-east-1
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database cleanup via ECS task
        shell: bash
        run: |
          set -euo pipefail

          SERVICE=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0]' \
            --output json)

          TASK_DEF=$(echo "$SERVICE" | jq -r '.taskDefinition')
          NETWORK_CONFIG=$(echo "$SERVICE" | jq -c '.networkConfiguration')
          LAUNCH_TYPE=$(echo "$SERVICE" | jq -r '.launchType // "FARGATE"')

          CONTAINER_NAME=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --query 'taskDefinition.containerDefinitions[0].name' \
            --output text)

          echo "Task definition : $TASK_DEF"
          echo "Container name  : $CONTAINER_NAME"
          echo "Launch type     : $LAUNCH_TYPE"

          read -r -d '' PYTHON_SCRIPT <<'PYEOF' || true
          import os, sys
          try:
              def normalize_sync_database_url(database_url: str) -> str:
                  if "+asyncpg" in database_url:
                      database_url = database_url.replace("+asyncpg", "+psycopg")
                  elif "+aiosqlite" in database_url:
                      database_url = database_url.replace("+aiosqlite", "")
                  if database_url.startswith("postgres://"):
                      database_url = database_url.replace("postgres://", "postgresql+psycopg://", 1)
                  elif database_url.startswith("postgresql://") and "+psycopg" not in database_url:
                      database_url = database_url.replace("postgresql://", "postgresql+psycopg://", 1)
                  return database_url

              db_url = os.environ.get("LANGFLOW_DATABASE_URL", "")
              if not db_url:
                  print("Error: LANGFLOW_DATABASE_URL is not set", file=sys.stderr)
                  sys.exit(1)

              print(f"Connecting to database (driver: psycopg)...")
              from sqlalchemy import create_engine, text
              engine = create_engine(
                  normalize_sync_database_url(db_url),
                  connect_args={"connect_timeout": 30},
              )
              with engine.begin() as conn:
                  n = conn.execute(text(
                      'SELECT COUNT(*) FROM "message" '
                      "WHERE \"timestamp\" < NOW() - INTERVAL '7 days'"
                  )).scalar_one()
                  print(f"Messages to delete: {n}")

                  r = conn.execute(text(
                      'DELETE FROM "message" '
                      "WHERE \"timestamp\" < NOW() - INTERVAL '7 days'"
                  ))
                  print(f"Deleted {r.rowcount} messages")

                  try:
                      r = conn.execute(text(
                          'DELETE FROM "transaction" '
                          "WHERE \"timestamp\" < NOW() - INTERVAL '7 days'"
                      ))
                      print(f"Deleted {r.rowcount} transactions")
                  except Exception as e:
                      print(f"transaction table skip: {e}")

              print("Done.")
          except Exception as e:
              print(f"Error: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

          # ECS containerOverrides does NOT support "entryPoint". To bypass the
          # base image ENTRYPOINT we register a one-off task-def revision with a
          # custom entryPoint that runs our Python cleanup script directly.
          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --query 'taskDefinition' \
            --output json)

          CLEANUP_TASK_DEF=$(echo "$TASK_DEF_JSON" | jq \
            --arg container "$CONTAINER_NAME" \
            --arg script "$PYTHON_SCRIPT" \
            '.containerDefinitions |= map(
              if .name == $container then
                .entryPoint = ["python3", "-c", $script] | .command = []
              else . end
            ) | {
              family,
              containerDefinitions,
              taskRoleArn,
              executionRoleArn,
              networkMode,
              cpu,
              memory,
              requiresCompatibilities,
              runtimePlatform
            } | with_entries(select(.value != null))')

          CLEANUP_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$CLEANUP_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Registered cleanup task def: $CLEANUP_TASK_DEF_ARN"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$CLEANUP_TASK_DEF_ARN" \
            --network-configuration "$NETWORK_CONFIG" \
            --launch-type "$LAUNCH_TYPE" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Launched cleanup task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          REASON=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' \
            --output text)

          echo "Stopped reason: $REASON"
          echo "Task exit code: $EXIT_CODE"

          # Deregister the one-off task definition to avoid clutter
          aws ecs deregister-task-definition \
            --task-definition "$CLEANUP_TASK_DEF_ARN" > /dev/null 2>&1 || true

          [ "$EXIT_CODE" = "0" ] || exit 1
