name: Langflow message retention (7 days)

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: host-langflow
    env:
      ECS_CLUSTER: fc-web-server-f0ei9o-x1ck1bek
      ECS_SERVICE: fc-web-server-f0ei9o-x1ck1bek
      AWS_REGION: us-east-1
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database cleanup via ECS task
        shell: bash
        run: |
          set -euo pipefail

          SERVICE=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0]' \
            --output json)

          TASK_DEF=$(echo "$SERVICE" | jq -r '.taskDefinition')
          NETWORK_CONFIG=$(echo "$SERVICE" | jq -c '.networkConfiguration')
          LAUNCH_TYPE=$(echo "$SERVICE" | jq -r '.launchType // "FARGATE"')

          CONTAINER_NAME=$(aws ecs describe-task-definition \
            --task-definition "$TASK_DEF" \
            --query 'taskDefinition.containerDefinitions[0].name' \
            --output text)

          echo "Task definition : $TASK_DEF"
          echo "Container name  : $CONTAINER_NAME"
          echo "Launch type     : $LAUNCH_TYPE"

          read -r -d '' PYTHON_SCRIPT <<'PYEOF' || true
          import os, sys
          try:
              from sqlalchemy import create_engine, text
              engine = create_engine(os.environ["LANGFLOW_DATABASE_URL"])
              with engine.begin() as conn:
                  n = conn.execute(text(
                      "SELECT COUNT(*) FROM public.message "
                      "WHERE timestamp < NOW() - INTERVAL '7 days'"
                  )).scalar()
                  print(f"Messages to delete: {n}")

                  r = conn.execute(text(
                      "DELETE FROM public.message "
                      "WHERE timestamp < NOW() - INTERVAL '7 days'"
                  ))
                  print(f"Deleted {r.rowcount} messages")

                  try:
                      r = conn.execute(text(
                          "DELETE FROM public.transaction "
                          "WHERE timestamp < NOW() - INTERVAL '7 days'"
                      ))
                      print(f"Deleted {r.rowcount} transactions")
                  except Exception as e:
                      print(f"transaction table skip: {e}")

              print("Done.")
          except Exception as e:
              print(f"Error: {e}", file=sys.stderr)
              sys.exit(1)
          PYEOF

          # IMPORTANT: ECS containerOverrides supports command, not entryPoint.
          OVERRIDES=$(jq -n \
            --arg container "$CONTAINER_NAME" \
            --arg script "$PYTHON_SCRIPT" \
            '{containerOverrides:[{
               name: $container,
               command: ["sh","-lc","python3 -c \"$PY_SCRIPT\""],
               environment: [{name:"PY_SCRIPT", value:$script}]
             }]}')

          TASK_ARN=$(aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --task-definition "$TASK_DEF" \
            --network-configuration "$NETWORK_CONFIG" \
            --launch-type "$LAUNCH_TYPE" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Launched cleanup task: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          REASON=$(aws ecs describe-tasks \
            --cluster "$ECS_CLUSTER" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' \
            --output text)

          echo "Stopped reason: $REASON"
          echo "Task exit code: $EXIT_CODE"
          [ "$EXIT_CODE" = "0" ] || exit 1
